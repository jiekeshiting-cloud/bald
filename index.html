<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>二宝子</title>
  <style>
    :root {
      --bg-light: #f8f6f2;     /* 白天：暖米白（更高级） */
      --bg-dark: linear-gradient(135deg, #0a0a2e, #1a1433, #2a1f4d, #3a2a66); /* 夜晚：静奢紫蓝 */
      --text: #1f1f1f;
      --muted: #666666;
      --accent: #a78bfa;
      --card-bg: #f8f7ff;
      --border: #e0d4ff;
    }

    [data-theme="dark"] {
      --text: #ffffff;
      --muted: #bbbbbb;
      --accent: #c4b5fd;
      --card-bg: #1a1450;
      --border: #6b5ab0;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background: var(--bg-light);           /* 默认白天 */
      color: var(--text);
      min-height: 100vh;
      transition: background 0.8s ease;
    }

    [data-theme="dark"] body {
      background: var(--bg-dark);
      background-size: 300% 300%;
      animation: gradientShift 25s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 其余样式保持不变（这里省略以节省篇幅，你可以直接复制到你原来的代码中替换 :root 和 body 部分） */
  </style>
</head>
<body data-theme="light">
  <!-- 你的原有内容保持不变 -->
</body>
</html>
