<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>二宝子</title>
  <style>
    :root {
      --bg1: #0f0a2e;
      --bg2: #2a0f5e;
      --bg3: #4a1a8c;
      --accent: #c4b5fd;
      --glass: rgba(255,255,255,0.09);
      --glass-border: rgba(180,160,255,0.35);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --card-bg: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3), #6b1a9e);
      background-size: 300% 300%;
      animation: gradientShift 18s ease infinite;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

    .container { position:relative; z-index:2; width:100%; max-width:1180px; margin:0 auto; padding:20px 16px 80px; }

    .marquee-container {
      margin: 12px 0 20px; padding: 14px 0; overflow:hidden; border-radius:999px;
      background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px);
    }
    .marquee { 
      display:inline-block; white-space:nowrap; font-size:16.5px; font-weight:600;
      color:var(--accent); padding-left:100%; animation:marquee 28s linear infinite; 
    }
    @keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-100%);} }

    .header { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:20px; text-align:center; }
    .hero {
      padding:24px 20px; border:1px solid var(--glass-border); border-radius:28px;
      background:var(--glass); backdrop-filter:blur(22px); width:100%;
    }
    .avatar { width:88px; height:88px; border-radius:50%; object-fit:cover; border:4px solid rgba(180,160,255,0.7); }
    .title-box h1 { font-size:32px; letter-spacing:2px; margin-bottom:6px; }
    .title-box .datetime { font-size:15.5px; color:var(--muted); font-weight:500; }

    .search-box {
      margin:20px 0 30px; padding:16px 20px; border-radius:999px;
      background:rgba(255,255,255,0.12); border:1px solid rgba(180,160,255,0.4); backdrop-filter:blur(18px);
    }
    .search-input { width:100%; border:none; outline:none; background:transparent; color:var(--text); font-size:16.5px; }

    .controls { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:20px; }
    button {
      background:rgba(255,255,255,0.22); color:var(--text); border:1px solid rgba(180,160,255,0.45);
      padding:13px 24px; border-radius:999px; cursor:pointer; font-size:14.8px;
      transition: all 0.3s ease;
    }
    button:hover { background:rgba(180,160,255,0.35); transform:scale(1.05); }

    .section-title { 
      font-size:18px; margin:32px 0 16px; padding-left:14px; 
      border-left:5px solid var(--accent); font-weight:600;
    }

    .grid { 
      display:grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap:18px; 
    }

    .card {
      display:block; text-decoration:none; color:var(--text); padding:20px 18px; border-radius:22px;
      background:var(--card-bg); border:1px solid rgba(180,160,255,0.25); 
      backdrop-filter:blur(14px); box-shadow:0 10px 25px rgba(0,0,0,0.35);
      transition:all 0.3s ease;
    }
    .card:hover { 
      transform:translateY(-8px); 
      box-shadow:0 25px 55px rgba(180,160,255,0.3);
      border-color: rgba(180,160,255,0.55);
    }

    .card .icon { font-size:33px; margin-bottom:12px; }
    .card h3 { font-size:17px; margin-bottom:8px; }
    .card p { font-size:13.5px; color:var(--muted); line-height:1.5; }

    .add-form {
      margin:30px 0; padding:24px; background:var(--glass); border:1px solid var(--glass-border);
      border-radius:24px; backdrop-filter:blur(20px);
    }
    .add-form input, .add-form select, .add-form textarea {
      width:100%; padding:12px 16px; margin-bottom:12px; border-radius:12px;
      border:1px solid rgba(180,160,255,0.3); background:rgba(255,255,255,0.08);
      color:var(--text); font-size:15px;
    }
    .add-form button { width:100%; padding:14px; font-size:16px; }

    .footer { margin-top:60px; text-align:center; color:rgba(255,255,255,0.65); font-size:13.5px; }
  </style>
</head>
<body data-theme="dark">
  <canvas id="particles"></canvas>

  <div class="container">
    <div class="marquee-container">
      <div class="marquee">我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天</div>
    </div>

    <div class="header">
      <div class="hero">
        <img class="avatar" src="avatar.jpg" alt="二宝子头像">
        <div class="title-box">
          <h1>二宝子</h1>
          <div class="datetime" id="datetime"></div>
        </div>
      </div>
    </div>

    <!-- 谷歌搜索框 -->
    <div class="search-box">
      <input id="googleSearch" class="search-input" type="text" placeholder="用谷歌搜索...（回车搜索）">
    </div>

    <div class="controls">
      <button id="addBtn">➕ 添加书签</button>
      <button id="themeBtn">🌙 浅色模式</button>
    </div>

    <!-- 添加书签表单（默认隐藏） -->
    <div id="addForm" class="add-form" style="display: none;">
      <input id="addName" type="text" placeholder="书签名称（如：我的网站）" required>
      <input id="addUrl" type="text" placeholder="网址（如：https://jierry-alt.github.io/）" required>
      <input id="addIcon" type="text" placeholder="图标（Emoji，如：🌟）" value="🌐">
      <input id="addDesc" type="text" placeholder="描述（可选）">
      <select id="addCategory">
        <option value="常用工具">常用工具</option>
        <option value="学习资源">学习资源</option>
        <option value="娱乐休闲">娱乐休闲</option>
        <option value="个人网站">个人网站</option>
        <option value="其他">其他</option>
      </select>
      <button id="confirmAdd">✅ 添加到书签</button>
    </div>

    <!-- 书签显示区域 -->
    <div id="bookmarksContainer"></div>

    <div class="footer">
      © 2026 二宝子 · 按 T 切换主题 · 按 / 聚焦搜索
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto"></audio>

  <script>
    let bookmarks = [];

    // 从本地加载书签
    function loadBookmarks() {
      const saved = localStorage.getItem('erbaoBookmarks');
      if (saved) {
        bookmarks = JSON.parse(saved);
      }
      renderBookmarks();
    }

    // 保存到本地
    function saveBookmarks() {
      localStorage.setItem('erbaoBookmarks', JSON.stringify(bookmarks));
    }

    function renderBookmarks() {
      const container = document.getElementById('bookmarksContainer');
      container.innerHTML = '';

      // 按分类分组显示
      const groups = {};
      bookmarks.forEach(item => {
        if (!groups[item.category]) groups[item.category] = [];
        groups[item.category].push(item);
      });

      Object.keys(groups).forEach(cat => {
        let html = `<div class="section-title">${cat}</div><div class="grid">`;
        groups[cat].forEach(item => {
          html += `
            <a class="card" href="${item.url}" target="_blank" rel="noopener">
              <div class="icon">${item.icon}</div>
              <h3>${item.name}</h3>
              <p>${item.desc || ''}</p>
            </a>`;
        });
        html += '</div>';
        container.innerHTML += html;
      });

      if (bookmarks.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:var(--muted); padding:40px;">还没有书签，点击上方「➕ 添加书签」开始吧～</p>`;
      }
    }

    // 时间显示
    function updateDateTime() {
      const dt = document.getElementById('datetime');
      setInterval(() => {
        const now = new Date();
        const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        dt.textContent = now.toLocaleString('zh-CN', options).replace(',', '');
      }, 1000);
    }

    // 谷歌搜索
    document.getElementById('googleSearch').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const query = encodeURIComponent(e.target.value.trim());
        if (query) {
          window.open(`https://www.google.com/search?q=${query}&hl=zh-CN`, '_blank');
        }
      }
    });

    // 添加书签按钮
    document.getElementById('addBtn').addEventListener('click', () => {
      const form = document.getElementById('addForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    });

    // 确认添加
    document.getElementById('confirmAdd').addEventListener('click', () => {
      const name = document.getElementById('addName').value.trim();
      const url = document.getElementById('addUrl').value.trim();
      const icon = document.getElementById('addIcon').value.trim() || '🔗';
      const desc = document.getElementById('addDesc').value.trim();
      const category = document.getElementById('addCategory').value;

      if (!name || !url) {
        alert('书签名称和网址不能为空！');
        return;
      }

      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        alert('网址必须以 http:// 或 https:// 开头');
        return;
      }

      bookmarks.push({ name, url, icon, desc, category });
      saveBookmarks();
      renderBookmarks();

      // 清空表单并隐藏
      document.getElementById('addName').value = '';
      document.getElementById('addUrl').value = '';
      document.getElementById('addDesc').value = '';
      document.getElementById('addForm').style.display = 'none';

      alert('✅ 书签添加成功！');
    });

    // 初始化
    loadBookmarks();
    updateDateTime();
  </script>
</body>
</html>
