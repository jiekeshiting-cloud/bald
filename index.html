<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>二宝子的导航书签</title>
  <style>
    :root {
      --bg1: #0f0c29; --bg2: #302b63; --bg3: #24243e;
      --accent: #a5b4fc;
      --glass: rgba(255,255,255,0.12); --glass-border: rgba(255,255,255,0.25);
      --text: #ffffff; --muted: rgba(255,255,255,0.85); --card-bg: rgba(255,255,255,0.11);
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: cover;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    #particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

    .container { position:relative; z-index:2; width:100%; max-width:1180px; margin:0 auto; padding:20px 16px 80px; }

    .marquee-container {
      margin: 12px 0 20px; padding: 14px 0; overflow:hidden; border-radius:999px;
      background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px);
    }
    .marquee { display:inline-block; white-space:nowrap; font-size:16.5px; font-weight:600;
      color:var(--accent); padding-left:100%; animation:marquee 26s linear infinite; }
    @keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-100%);} }

    .header { display:flex; flex-direction:column; align-items:center; gap:16px; margin-bottom:12px; }
    .hero {
      display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px;
      padding:24px 20px; border:1px solid var(--glass-border); border-radius:28px;
      background:var(--glass); backdrop-filter:blur(22px); width:100%;
    }
    .avatar { width:94px; height:94px; border-radius:50%; object-fit:cover; border:4px solid rgba(165,180,252,0.7); }
    .title-box h1 { font-size:29px; letter-spacing:1.5px; margin-bottom:4px; }
    .title-box p { color:var(--muted); font-size:15px; }

    .info-bar {
      margin: 8px 0 22px; padding: 16px 20px; background:var(--glass); border:1px solid var(--glass-border);
      border-radius:22px; backdrop-filter:blur(20px); font-size:14.8px; text-align:center;
    }

    .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; width:100%; margin-bottom:16px; }
    button {
      background:rgba(255,255,255,0.25); color:var(--text); border:1px solid rgba(165,180,252,0.4);
      padding:13px 22px; border-radius:999px; cursor:pointer; font-size:14.5px; min-width:130px;
    }
    button:hover { background:rgba(165,180,252,0.3); transform:scale(1.05); }

    .search-box { margin:12px 0 24px; padding:16px 20px; border-radius:999px;
      background:rgba(255,255,255,0.13); border:1px solid rgba(165,180,252,0.3); backdrop-filter:blur(18px); }
    .search-input { width:100%; border:none; outline:none; background:transparent; color:var(--text); font-size:16px; }

    .section-title { 
      font-size:17.5px; margin:28px 0 14px; padding-left:10px; 
      border-left:4px solid var(--accent); 
    }

    .grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; }

    .card {
      display:block; text-decoration:none; color:var(--text); padding:20px 16px; border-radius:20px;
      background:var(--card-bg); border:1px solid rgba(165,180,252,0.25); 
      backdrop-filter:blur(14px); box-shadow:0 10px 25px rgba(0,0,0,0.3);
      transition:all 0.3s ease;
    }
    .card:hover { transform:translateY(-7px); box-shadow:0 20px 45px rgba(165,180,252,0.25); }

    .card .icon { font-size:31px; margin-bottom:10px; }
    .card h3 { font-size:16.8px; margin-bottom:6px; }
    .card p { font-size:13.2px; color:var(--muted); line-height:1.6; }

    /* 已导入书签区域 - 更醒目 */
    #importedSection {
      margin-top: 50px;
      padding: 20px;
      background: rgba(165,180,252,0.08);
      border: 2px dashed rgba(165,180,252,0.4);
      border-radius: 24px;
    }

    .footer { margin-top:60px; text-align:center; color:rgba(255,255,255,0.72); font-size:13px; }
  </style>
</head>
<body data-theme="dark">
  <canvas id="particles"></canvas>

  <div class="container">
    <div class="marquee-container">
      <div class="marquee">我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天</div>
    </div>

    <div class="header">
      <div class="hero">
        <img class="avatar" src="avatar.jpg" alt="二宝子头像">
        <div class="title-box">
          <h1>二宝子的导航书签</h1>
          <p>属于二宝子的专属小窝～</p>
        </div>
      </div>
    </div>

    <div class="info-bar">
      <span id="dateTime"></span><br>
      <strong id="cityName"></strong> <span id="temp"></span> | 湿度 <span id="humidity"></span>%
    </div>

    <div class="controls">
      <button id="themeBtn">🌙 浅色模式</button>
      <button id="musicBtn">🎵 播放背景音乐 (1/4)</button>
      <button id="exportBtn">📤 导出书签</button>
      <button id="importBtn">📥 导入书签</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>

    <div class="search-box">
      <input id="searchInput" class="search-input" type="text" placeholder="搜索书签...（按 / 聚焦）">
    </div>

    <!-- 原始书签 -->
    <div id="originalSections"></div>

    <!-- 已导入书签（新增且醒目） -->
    <div id="importedSection" style="display: none;">
      <div class="section-title">📥 已导入的书签（点击下方卡片可跳转）</div>
      <div id="importedGrid" class="grid"></div>
    </div>

    <div class="footer">
      © 2026 二宝子的导航书签 · 按 T 切换主题 · 按 / 搜索
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto"></audio>

  <script>
    // 粒子、音乐、时间等代码保持（为了长度，这里省略了重复部分，你可以从上一个版本复制过来）
    // ...（粒子动画、音乐、时间、天气、搜索等）

    let originalCategories = [ /* 你的原始书签数据 */ ];
    let importedCategories = [];

    function renderSections(containerId, data) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      data.forEach(cat => {
        let html = `<div class="section-title">${cat.title}</div><div class="grid">`;
        cat.cards.forEach(card => {
          html += `<a class="card" href="${card.url}" target="_blank">
            <div class="icon">${card.icon}</div>
            <h3>${card.name}</h3>
            <p>${card.desc}</p>
          </a>`;
        });
        html += '</div>';
        container.innerHTML += html;
      });
    }

    // 导入功能
    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFile').click();
    });

    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (!Array.isArray(imported) || imported.length === 0) {
            alert('❌ 文件内容为空或格式错误');
            return;
          }

          importedCategories = imported;
          document.getElementById('importedSection').style.display = 'block';
          
          renderSections('importedGrid', importedCategories);

          // 自动滚动到导入区域
          document.getElementById('importedSection').scrollIntoView({ behavior: 'smooth' });

          alert(`✅ 成功导入 ${imported.length} 个分类！已在下方显示`);
        } catch (err) {
          alert('❌ 导入失败：文件格式不正确');
        }
      };
      reader.readAsText(file);
    });

    // 初始化
    renderSections('originalSections', originalCategories);
    // 粒子、音乐等初始化代码...
  </script>
</body>
</html>
