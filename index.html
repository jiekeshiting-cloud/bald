<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>二宝子的导航书签</title>
  <style>
    :root {
      --bg1: #0f0c29;
      --bg2: #302b63;
      --bg3: #24243e;
      --accent: #a5b4fc;
      --glass: rgba(255,255,255,0.12);
      --glass-border: rgba(255,255,255,0.25);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.85);
      --card-bg: rgba(255,255,255,0.11);
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: cover;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /* 粒子画布 */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container { position:relative; z-index:2; width:100%; max-width:1180px; margin:0 auto; padding:20px 16px 80px; }

    /* 跑马灯最顶部 */
    .marquee-container {
      margin: 12px 0 20px;
      padding: 14px 0;
      overflow: hidden;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .marquee {
      display: inline-block;
      white-space: nowrap;
      font-size: 16.5px;
      font-weight: 600;
      color: var(--accent);
      padding-left: 100%;
      animation: marquee 26s linear infinite;
      text-shadow: 0 0 15px rgba(165,180,252,0.8);
    }
    @keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-100%);} }

    .header { display:flex; flex-direction:column; align-items:center; gap:16px; margin-bottom:10px; }
    .hero {
      display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px;
      padding:24px 20px; border:1px solid var(--glass-border); border-radius:28px;
      background:var(--glass); backdrop-filter:blur(22px); width:100%;
    }
    .avatar { width:94px; height:94px; border-radius:50%; object-fit:cover; border:4px solid rgba(165,180,252,0.7); }
    .title-box h1 { font-size:29px; letter-spacing:1.5px; margin-bottom:4px; text-shadow: 0 0 20px rgba(165,180,252,0.6); }
    .title-box p { color:var(--muted); font-size:15px; }

    .info-bar {
      margin: 8px 0 22px;
      padding: 16px 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      backdrop-filter: blur(20px);
      font-size: 14.8px;
      text-align: center;
    }

    .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; width:100%; margin-bottom:16px; }
    button {
      background:rgba(255,255,255,0.25); color:var(--text); border:1px solid rgba(165,180,252,0.4);
      padding:13px 22px; border-radius:999px; cursor:pointer; font-size:14.5px; min-width:130px;
      transition: all 0.3s ease;
    }
    button:hover { background:rgba(165,180,252,0.3); transform:scale(1.05); }

    .search-box { 
      margin:12px 0 24px; padding:16px 20px; border-radius:999px;
      background:rgba(255,255,255,0.13); border:1px solid rgba(165,180,252,0.3); 
      backdrop-filter:blur(18px); 
    }
    .search-input { width:100%; border:none; outline:none; background:transparent; color:var(--text); font-size:16px; }

    .section-title { 
      font-size:17.5px; margin:28px 0 14px; padding-left:10px; 
      border-left:4px solid var(--accent); 
    }

    .grid { 
      display:grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap:16px; 
    }

    .card {
      display:block; text-decoration:none; color:var(--text); padding:20px 16px; border-radius:20px;
      background:var(--card-bg); border:1px solid rgba(165,180,252,0.25); 
      backdrop-filter:blur(14px); box-shadow:0 10px 25px rgba(0,0,0,0.3);
      transition:all 0.3s ease;
    }
    .card:hover { 
      transform:translateY(-7px); 
      box-shadow:0 20px 45px rgba(165,180,252,0.25); 
    }

    .card .icon { font-size:31px; margin-bottom:10px; }
    .card h3 { font-size:16.8px; margin-bottom:6px; }
    .card p { font-size:13.2px; color:var(--muted); line-height:1.6; }

    .weather { 
      margin:16px 0; padding:14px 18px; background:var(--glass); border-radius:20px;
      border:1px solid var(--glass-border); backdrop-filter:blur(16px); font-size:14.5px; 
      text-align:center; 
    }

    .footer { 
      margin-top:60px; text-align:center; color:rgba(255,255,255,0.72); font-size:13px; 
    }
  </style>
</head>
<body data-theme="dark">
  <!-- 粒子背景 -->
  <canvas id="particles"></canvas>

  <div class="container">
    <!-- 跑马灯最顶部 -->
    <div class="marquee-container">
      <div class="marquee">我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天</div>
    </div>

    <div class="header">
      <div class="hero">
        <img class="avatar" src="avatar.jpg" alt="二宝子头像">
        <div class="title-box">
          <h1>二宝子的导航书签</h1>
          <p>属于二宝子的专属小窝～</p>
        </div>
      </div>
    </div>

    <!-- 时间 + 天气 -->
    <div class="info-bar">
      <span id="dateTime"></span><br>
      <strong id="cityName"></strong> <span id="temp"></span> | 湿度 <span id="humidity"></span>%
    </div>

    <div class="controls">
      <button id="themeBtn">🌙 浅色模式</button>
      <button id="musicBtn">🎵 播放背景音乐 (1/4)</button>
      <button id="exportBtn">📤 导出书签</button>
      <button id="importBtn">📥 导入书签</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>

    <div class="search-box">
      <input id="searchInput" class="search-input" type="text" placeholder="搜索书签...（按 / 聚焦）">
    </div>

    <div id="sections"></div>

    <div class="footer">
      © 2026 二宝子的导航书签 · 按 T 切换主题 · 按 / 搜索
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto"></audio>

  <script>
    // ==================== 粒子动画（更亮、更炫） ====================
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 4 + 1.5;
        this.speedX = Math.random() * 0.8 - 0.4;
        this.speedY = Math.random() * 0.8 - 0.4;
        this.opacity = Math.random() * 0.7 + 0.4;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(165, 180, 252, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 150; i++) particles.push(new Particle());
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      initParticles();
    });

    // ==================== 音乐自动播放优化 ====================
    const audio = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    let isPlaying = false;
    let hasUserInteracted = false;

    const musicList = [
      { name: "那一年那一天", url: "https://files.catbox.moe/fawyem.flac" },
      { name: "平凡之路",     url: "https://files.catbox.moe/89l1hc.flac" },
      { name: "相濡以沫",     url: "https://files.catbox.moe/0oluxu.flac" },
      { name: "空位",         url: "https://streamshare.wireway.ch/download/yt5oyld9" }
    ];

    let currentMusicIndex = 0;

    function loadMusic(index) {
      audio.src = musicList[index].url;
      audio.load();
    }

    async function playMusic() {
      if (isPlaying) return;
      try {
        audio.volume = 0.42;
        await audio.play();
        isPlaying = true;
        updateMusicButton();
      } catch(e) {}
    }

    function updateMusicButton() {
      const status = isPlaying ? '⏸' : '🎵';
      musicBtn.textContent = `${status} ${musicList[currentMusicIndex].name} (${currentMusicIndex + 1}/4)`;
    }

    // 用户首次点击任意位置 → 自动播放音乐
    document.addEventListener('click', () => {
      if (!hasUserInteracted) {
        hasUserInteracted = true;
        loadMusic(currentMusicIndex);
        playMusic();
      }
    }, { once: true });

    // 按钮手动切换
    musicBtn.addEventListener('click', async () => {
      if (!hasUserInteracted) {
        hasUserInteracted = true;
        loadMusic(currentMusicIndex);
      }
      if (!isPlaying) {
        await playMusic();
      } else {
        audio.pause();
        isPlaying = false;
        updateMusicButton();
      }
    });

    audio.addEventListener('ended', () => {
      currentMusicIndex = (currentMusicIndex + 1) % musicList.length;
      loadMusic(currentMusicIndex);
      if (isPlaying) audio.play();
      updateMusicButton();
    });

    // ==================== 其他功能（保持） ====================
    // （粒子、书签渲染、时间、天气、搜索、主题切换等保持不变）
    // 这里省略了重复代码，你可以把之前版本的这些部分粘贴进来

    // 初始化
    resizeCanvas();
    initParticles();
    animateParticles();
    renderSections();   // 你的书签渲染函数
    updateMusicButton();
  </script>
</body>
</html>
