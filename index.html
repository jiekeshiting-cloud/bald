<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>二宝子的导航书签</title>
  <style>
    :root {
      --bg1: #1e1b4b;
      --bg2: #4c1d95;
      --bg3: #1e3a8a;
      --glass: rgba(255,255,255,0.09);
      --glass-border: rgba(255,255,255,0.18);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --card-bg: rgba(255,255,255,0.10);
    }
    [data-theme="light"] {
      --bg1: #6366f1; --bg2: #a855f7; --bg3: #3b82f6;
      --glass: rgba(255,255,255,0.78); --glass-border: rgba(0,0,0,0.12);
      --text: #1f2937; --muted: rgba(0,0,0,0.68); --card-bg: rgba(255,255,255,0.93);
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: cover;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /* 粒子画布 */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container { 
      position: relative; 
      z-index: 2; 
      width: 100%; 
      max-width: 1180px; 
      margin: 0 auto; 
      padding: 20px 16px 80px; 
    }

    /* 跑马灯 - 最顶部 */
    .marquee-container {
      margin: 12px 0 20px;
      padding: 14px 0;
      overflow: hidden;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .marquee {
      display: inline-block;
      white-space: nowrap;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      padding-left: 100%;
      animation: marquee 26s linear infinite;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    @keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-100%);} }

    .header { display:flex; flex-direction:column; align-items:center; gap:16px; margin-bottom:10px; }
    .hero {
      display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px;
      padding:24px 20px; border:1px solid var(--glass-border); border-radius:28px;
      background:var(--glass); backdrop-filter:blur(20px); width:100%;
    }
    .avatar { width:92px; height:92px; border-radius:50%; object-fit:cover; border:4px solid rgba(255,255,255,0.85); }
    .title-box h1 { font-size:29px; letter-spacing:1.2px; margin-bottom:4px; }
    .title-box p { color:var(--muted); font-size:15px; }

    .info-bar {
      margin: 8px 0 20px;
      padding: 16px 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(18px);
      font-size: 14.8px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; width:100%; margin-bottom:16px; }
    button {
      background:rgba(255,255,255,0.22); color:var(--text); border:1px solid rgba(255,255,255,0.35);
      padding:12px 20px; border-radius:999px; cursor:pointer; font-size:14px; min-width:130px;
    }
    button:hover { background:rgba(255,255,255,0.4); transform:scale(1.04); }

    .search-box { 
      margin:12px 0 24px; padding:16px 20px; border-radius:999px;
      background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); 
      backdrop-filter:blur(16px); 
    }
    .search-input { width:100%; border:none; outline:none; background:transparent; color:var(--text); font-size:16px; }

    .section-title { 
      font-size:17.5px; margin:28px 0 14px; padding-left:10px; 
      border-left:4px solid rgba(167,139,250,0.8); 
    }

    .grid { 
      display:grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap:16px; 
    }

    .card {
      display:block; text-decoration:none; color:var(--text); padding:20px 16px; border-radius:20px;
      background:var(--card-bg); border:1px solid rgba(255,255,255,0.18); 
      backdrop-filter:blur(14px); box-shadow:0 10px 25px rgba(0,0,0,0.25);
      transition:all 0.3s ease;
    }
    .card:hover, .card:active { 
      transform:translateY(-6px); 
      box-shadow:0 18px 40px rgba(0,0,0,0.35); 
    }

    .card .icon { font-size:30px; margin-bottom:10px; }
    .card h3 { font-size:16.5px; margin-bottom:6px; }
    .card p { font-size:13px; color:var(--muted); line-height:1.6; }

    .weather { 
      margin:16px 0; padding:14px 18px; background:var(--glass); border-radius:20px;
      border:1px solid var(--glass-border); backdrop-filter:blur(16px); font-size:14.5px; 
      text-align:center; 
    }

    .footer { 
      margin-top:60px; text-align:center; color:rgba(255,255,255,0.7); font-size:13px; 
    }
  </style>
</head>
<body data-theme="dark">
  <!-- 粒子背景 -->
  <canvas id="particles"></canvas>

  <div class="container">
    <!-- 跑马灯最顶部 -->
    <div class="marquee-container">
      <div class="marquee">我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天</div>
    </div>

    <div class="header">
      <div class="hero">
        <img class="avatar" src="avatar.jpg" alt="二宝子头像">
        <div class="title-box">
          <h1>二宝子的导航书签</h1>
          <p>属于二宝子的专属小窝～</p>
        </div>
      </div>
    </div>

    <!-- 时间日期 + 天气 -->
    <div class="info-bar">
      <span id="dateTime"></span><br>
      <strong id="cityName"></strong> <span id="temp"></span> | 湿度 <span id="humidity"></span>%
    </div>

    <div class="controls">
      <button id="themeBtn">🌙 浅色模式</button>
      <button id="musicBtn">🎵 播放背景音乐 (1/4)</button>
      <button id="exportBtn">📤 导出</button>
      <button id="importBtn">📥 导入</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>

    <div class="search-box">
      <input id="searchInput" class="search-input" type="text" placeholder="搜索书签...（按 / 聚焦）">
    </div>

    <div id="sections"></div>

    <div class="footer">
      © 2026 二宝子的导航书签 · 按 T 切换主题 · 按 / 搜索
    </div>
  </div>

  <!-- 多首背景音乐 -->
  <audio id="bgMusic" loop preload="auto"></audio>

  <script>
    // ==================== 粒子动画 ====================
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 0.5 - 0.25;
        this.speedY = Math.random() * 0.5 - 0.25;
        this.opacity = Math.random() * 0.6 + 0.3;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(167, 139, 250, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 120; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      initParticles();
    });

    // ==================== 音乐部分（保持你的4首） ====================
    const musicList = [
      { name: "那一年那一天", url: "https://files.catbox.moe/fawyem.flac" },
      { name: "平凡之路",     url: "https://files.catbox.moe/89l1hc.flac" },
      { name: "相濡以沫",     url: "https://files.catbox.moe/0oluxu.flac" },
      { name: "空位",         url: "https://streamshare.wireway.ch/download/yt5oyld9" }
    ];

    let currentMusicIndex = 0;
    const audio = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    let isPlaying = false;

    function loadMusic(index) {
      audio.src = musicList[index].url;
      audio.load();
    }

    async function toggleMusic() {
      try {
        if (!isPlaying) {
          if (!audio.src) loadMusic(currentMusicIndex);
          audio.volume = 0.38;
          await audio.play();
          isPlaying = true;
        } else {
          audio.pause();
          isPlaying = false;
        }
        updateMusicButton();
      } catch (err) {
        musicBtn.textContent = '❌ 播放失败';
      }
    }

    function updateMusicButton() {
      const status = isPlaying ? '⏸' : '🎵';
      musicBtn.textContent = `${status} ${musicList[currentMusicIndex].name} (${currentMusicIndex + 1}/4)`;
    }

    audio.addEventListener('ended', () => {
      currentMusicIndex = (currentMusicIndex + 1) % musicList.length;
      loadMusic(currentMusicIndex);
      if (isPlaying) audio.play();
      updateMusicButton();
    });

    musicBtn.addEventListener('click', toggleMusic);

    // ==================== 书签数据（已去除抖音和网易云，双列布局） ====================
    const categories = [
      { title: "常用工具", cards: [
        {icon:"🔎", name:"Google", desc:"全球最强搜索引擎", url:"https://www.google.com"},
        {icon:"📧", name:"Gmail", desc:"邮件收发与管理", url:"https://mail.google.com"},
        {icon:"📅", name:"Notion", desc:"全能笔记与知识库", url:"https://www.notion.so"},
        {icon:"🌐", name:"百度", desc:"中文搜索", url:"https://www.baidu.com"}
      ]},
      { title: "设计创作", cards: [
        {icon:"🎨", name:"Figma", desc:"界面设计与原型", url:"https://www.figma.com"},
        {icon:"🖼️", name:"Canva", desc:"快速图形设计", url:"https://www.canva.com"},
        {icon:"📸", name:"Photopea", desc:"免费在线PS", url:"https://www.photopea.com"}
      ]},
      { title: "学习资源", cards: [
        {icon:"📚", name:"Bilibili", desc:"视频学习", url:"https://www.bilibili.com"},
        {icon:"📖", name:"知乎", desc:"高质量问答", url:"https://www.zhihu.com"},
        {icon:"🎥", name:"YouTube", desc:"全球视频", url:"https://www.youtube.com"}
      ]},
      { title: "开发工具", cards: [
        {icon:"💻", name:"GitHub", desc:"代码托管", url:"https://github.com"},
        {icon:"🤖", name:"ChatGPT", desc:"AI 助手", url:"https://chat.openai.com"},
        {icon:"🔧", name:"Vercel", desc:"前端部署", url:"https://vercel.com"}
      ]}
    ];

    function renderSections() {
      const container = document.getElementById('sections');
      container.innerHTML = '';
      categories.forEach(cat => {
        let html = `<div class="section-title">${cat.title}</div><div class="grid">`;
        cat.cards.forEach(card => {
          html += `<a class="card" href="${card.url}" target="_blank">
            <div class="icon">${card.icon}</div>
            <h3>${card.name}</h3>
            <p>${card.desc}</p>
          </a>`;
        });
        html += '</div>';
        container.innerHTML += html;
      });
    }

    // 时间与天气
    function updateDateTime() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth()+1).padStart(2,'0');
      const day = String(now.getDate()).padStart(2,'0');
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      const weekday = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()];
      document.getElementById('dateTime').textContent = `${year}年${month}月${day}日 ${weekday} ${h}:${m}:${s}`;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    async function loadCityAndWeather() {
      try {
        const geo = await (await fetch('https://ipapi.co/json/')).json();
        document.getElementById('cityName').textContent = geo.city || '我的城市';

        const w = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude||39.9}&longitude=${geo.longitude||116.4}&current=temperature_2m,relative_humidity_2m`)).json();
        document.getElementById('temp').innerHTML = `${Math.round(w.current.temperature_2m)}°C`;
        document.getElementById('humidity').textContent = w.current.relative_humidity_2m;
      } catch(e) {}
    }
    loadCityAndWeather();

    // 主题切换、搜索、快捷键
    const themeBtn = document.getElementById('themeBtn');
    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      themeBtn.textContent = isDark ? '☀️ 深色模式' : '🌙 浅色模式';
    }
    themeBtn.addEventListener('click', toggleTheme);

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', () => {
      const kw = searchInput.value.trim().toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        card.style.display = card.textContent.toLowerCase().includes(kw) ? 'block' : 'none';
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
      if (e.key.toLowerCase() === 't') toggleTheme();
      if (e.key === 'Escape') searchInput.blur();
    });

    // 初始化
    resizeCanvas();
    initParticles();
    animateParticles();
    renderSections();
    loadMusic(0);
    updateMusicButton();
  </script>
</body>
</html>
