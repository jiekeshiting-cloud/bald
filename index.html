<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>二宝子的导航书签</title>
  <style>
    :root {
      --bg1: #0a0a2e;
      --bg2: #1a0f4d;
      --bg3: #2e1a6b;
      --accent: #a5b4fc;
      --glass: rgba(255,255,255,0.10);
      --glass-border: rgba(165,180,252,0.28);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.82);
      --card-bg: rgba(255,255,255,0.09);
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 400% 400%;
      animation: gradientShift 25s ease infinite;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

    .container { position:relative; z-index:2; width:100%; max-width:1180px; margin:0 auto; padding:20px 16px 80px; }

    .marquee-container {
      margin: 12px 0 20px; padding: 14px 0; overflow:hidden; border-radius:999px;
      background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px);
    }
    .marquee { 
      display:inline-block; white-space:nowrap; font-size:16.5px; font-weight:600;
      color:var(--accent); padding-left:100%; animation:marquee 28s linear infinite; 
    }
    @keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-100%);} }

    .header { display:flex; flex-direction:column; align-items:center; gap:16px; margin-bottom:12px; }
    .hero {
      display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px;
      padding:28px 20px; border:1px solid var(--glass-border); border-radius:28px;
      background:var(--glass); backdrop-filter:blur(22px); width:100%;
    }
    .avatar { width:94px; height:94px; border-radius:50%; object-fit:cover; border:4px solid rgba(165,180,252,0.75); }
    .title-box h1 { font-size:29px; letter-spacing:1.5px; margin-bottom:4px; }
    .title-box p { color:var(--muted); font-size:15px; }

    .info-bar {
      margin: 8px 0 22px; padding: 16px 20px; background:var(--glass); border:1px solid var(--glass-border);
      border-radius:22px; backdrop-filter:blur(20px); font-size:14.8px; text-align:center;
    }

    .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; width:100%; margin-bottom:16px; }
    button {
      background:rgba(255,255,255,0.22); color:var(--text); border:1px solid rgba(165,180,252,0.45);
      padding:13px 22px; border-radius:999px; cursor:pointer; font-size:14.5px; min-width:130px;
      transition: all 0.3s ease;
    }
    button:hover { background:rgba(165,180,252,0.35); transform:scale(1.06); }

    .search-box { 
      margin:12px 0 24px; padding:16px 20px; border-radius:999px;
      background:rgba(255,255,255,0.12); border:1px solid rgba(165,180,252,0.35); backdrop-filter:blur(18px); 
    }
    .search-input { width:100%; border:none; outline:none; background:transparent; color:var(--text); font-size:16px; }

    .section-title { 
      font-size:17.8px; margin:32px 0 14px; padding-left:12px; 
      border-left:5px solid var(--accent); font-weight:600;
    }

    .grid { 
      display:grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap:16px; 
    }

    .card {
      display:block; text-decoration:none; color:var(--text); padding:20px 16px; border-radius:20px;
      background:var(--card-bg); border:1px solid rgba(165,180,252,0.25); 
      backdrop-filter:blur(14px); box-shadow:0 10px 25px rgba(0,0,0,0.35);
      transition:all 0.3s ease;
    }
    .card:hover { 
      transform:translateY(-8px); 
      box-shadow:0 22px 50px rgba(165,180,252,0.28);
      border-color: rgba(165,180,252,0.5);
    }

    .card .icon { font-size:32px; margin-bottom:12px; }
    .card h3 { font-size:16.8px; margin-bottom:7px; }
    .card p { font-size:13.3px; color:var(--muted); line-height:1.55; }

    /* 已导入书签区域 */
    #importedSection {
      margin-top: 60px;
      padding: 28px 24px;
      background: rgba(165,180,252,0.09);
      border: 2px dashed rgba(165,180,252,0.55);
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .imported-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      color: var(--accent);
    }
  </style>
</head>
<body data-theme="dark">
  <canvas id="particles"></canvas>

  <div class="container">
    <div class="marquee-container">
      <div class="marquee">我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;我命由我不由天</div>
    </div>

    <div class="header">
      <div class="hero">
        <img class="avatar" src="avatar.jpg" alt="二宝子头像">
        <div class="title-box">
          <h1>二宝子的导航书签</h1>
          <p>属于二宝子的专属小窝～</p>
        </div>
      </div>
    </div>

    <div class="info-bar">
      <span id="dateTime"></span><br>
      <strong id="cityName"></strong> <span id="temp"></span> | 湿度 <span id="humidity"></span>%
    </div>

    <div class="controls">
      <button id="themeBtn">🌙 浅色模式</button>
      <button id="musicBtn">🎵 播放背景音乐 (1/4)</button>
      <button id="exportBtn">📤 导出书签</button>
      <button id="importBtn">📥 导入书签</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>

    <div class="search-box">
      <input id="searchInput" class="search-input" type="text" placeholder="搜索书签...（按 / 聚焦）">
    </div>

    <!-- 原始书签区域 -->
    <div id="originalSections"></div>

    <!-- 已导入书签区域（重点修复） -->
    <div id="importedSection" style="display: none;">
      <div class="imported-header">
        <span style="font-size:26px;">📥</span>
        <div>
          <div class="section-title" style="margin:0; border:none; padding:0; font-size:19px;">已导入的书签</div>
          <p style="font-size:14.5px; color:var(--muted); margin-top:4px;">点击卡片即可跳转</p>
        </div>
      </div>
      <div id="importedGrid" class="grid"></div>
    </div>

    <div class="footer">
      © 2026 二宝子的导航书签 · 按 T 切换主题 · 按 / 搜索
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto"></audio>

  <script>
    // ==================== 原始书签数据（你可以在这里添加自己的书签） ====================
    let originalCategories = [
      {
        "title": "常用工具",
        "cards": [
          { "name": "百度", "url": "https://baidu.com", "icon": "🔍", "desc": "百度一下" }
        ]
      }
    ];

    let importedCategories = [];

    // 渲染函数（已优化）
    function renderSections(containerId, data) {
      const container = document.getElementById(containerId);
      if (!container) return;
      
      container.innerHTML = '';
      
      if (data.length === 0) {
        container.innerHTML = '<p style="color:var(--muted); text-align:center; padding:20px;">暂无书签</p>';
        return;
      }

      data.forEach(cat => {
        let html = `<div class="section-title">${cat.title}</div><div class="grid">`;
        
        cat.cards.forEach(card => {
          html += `
            <a class="card" href="${card.url}" target="_blank" rel="noopener">
              <div class="icon">${card.icon || '🔗'}</div>
              <h3>${card.name}</h3>
              <p>${card.desc || '暂无描述'}</p>
            </a>`;
        });
        
        html += '</div>';
        container.innerHTML += html;
      });
    }

    // 导入功能（已优化）
    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFile').click();
    });

    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const importedData = JSON.parse(ev.target.result.trim());

          let newCategories = [];
          if (Array.isArray(importedData)) {
            newCategories = importedData;
          } else if (importedData && Array.isArray(importedData.categories)) {
            newCategories = importedData.categories;
          } else {
            alert('❌ 文件格式错误！\n\n请确保内容是一个书签分类数组。');
            return;
          }

          if (newCategories.length === 0) {
            alert('❌ 文件中没有书签内容');
            return;
          }

          importedCategories = newCategories;
          document.getElementById('importedSection').style.display = 'block';
          
          renderSections('importedGrid', importedCategories);

          // 自动滚动到导入区域
          document.getElementById('importedSection').scrollIntoView({ behavior: 'smooth' });

          alert(`✅ 导入成功！\n共导入 ${newCategories.length} 个分类`);

        } catch (err) {
          console.error(err);
          alert('❌ 导入失败：JSON 文件格式错误或损坏\n\n请检查文件是否正确保存为 UTF-8 编码');
        }
      };
      reader.readAsText(file);
      e.target.value = ''; // 清空，方便重复导入
    });

    // 初始化
    renderSections('originalSections', originalCategories);
  </script>
</body>
</html>
