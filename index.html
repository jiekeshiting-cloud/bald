<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>二宝子</title>
<style>
:root{--accent:#9f7aea}
body{font-family:"Microsoft YaHei",system-ui,sans-serif;background:#f8f5f0;color:#222;margin:0;padding:20px 16px;line-height:1.6}
.container{max-width:1200px;margin:0 auto}
.header{text-align:center;margin-bottom:30px}
.avatar{width:96px;height:96px;border-radius:50%;border:4px solid var(--accent)}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:25px 0 35px}
button{padding:14px;border-radius:999px;border:1px solid #e0d4ff;background:rgba(159,122,234,0.12);font-size:15px}
.search-box{margin:20px 0 35px;padding:16px 20px;border-radius:999px;background:rgba(255,255,255,0.7);border:1px solid #e0d4ff}
.search-input{width:100%;border:none;outline:none;background:transparent;font-size:16.5px}

/* ==================== 固定双列（最直接版） ==================== */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;     /* 强制两列 */
  gap: 18px;
}
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr 1fr; gap: 14px; }   /* 小屏幕也保持两列 */
}

.card{background:#fff;border:1px solid #e0d4ff;border-radius:22px;padding:18px;box-shadow:0 8px 25px rgba(0,0,0,.05)}
.card .icon{width:52px;height:52px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;border-radius:12px;overflow:hidden}
.card .icon img{width:100%;height:100%;object-fit:cover}
.section-title{font-size:18px;margin:35px 0 16px;padding-left:14px;border-left:5px solid var(--accent);font-weight:600}
.footer{margin-top:80px;text-align:center;color:#666;font-size:14px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img class="avatar" src="https://picsum.photos/id/64/96/96" alt="二宝子">
    <h1>二宝子</h1>
    <div id="datetime"></div>
  </div>

  <div class="search-box">
    <input id="googleSearch" class="search-input" type="text" placeholder="用谷歌搜索...（回车搜索）">
  </div>

  <div class="controls">
    <button id="themeToggle">☀️ 白天模式</button>
    <button id="musicBtn">🎵 音乐</button>
    <button id="cfLogin">🔐 Cloudflare 登录</button>
    <button id="githubLogin">🐙 GitHub 登录</button>
    <button id="addBtn">➕ 添加书签</button>
    <button id="clearBtn">🗑️ 清空全部</button>
  </div>

  <div id="bookmarksContainer"></div>

  <div class="footer">
    © 2026 二宝子<br>
    联系方式：<a href="https://t.me/你的TG" target="_blank">@你的Telegram</a>
  </div>
</div>

<script>
// 把你原来所有的 JavaScript 代码（loadBookmarks、renderBookmarks、editBookmark、事件绑定等）粘贴到这里
// 如果你原来的 script 很长，可以先保留，只替换上面的 <style> 部分中的 .grid 样式
</script>
</body>
</html>
